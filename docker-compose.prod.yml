# docker-compose.prod.yml
# PRODUCTION DEPLOYMENT — uses GHCR tagged images, hardened for 24/7 operation.
# Usage: IMAGE_TAG=v1.2.7 docker compose -f docker-compose.prod.yml up -d
# Internal services (core_api, ai_engine) are NOT exposed to the host.

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedin_prod_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_saas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  ai_engine:
    image: ghcr.io/slingvector/linkedin-engagement-ai-ai_engine:${IMAGE_TAG}
    container_name: linkedin_prod_ai_engine
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    environment:
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY}
      - LLM_PROVIDER=vertexai
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-mcr-relay-1772228380}
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - VERTEX_MODEL=${VERTEX_MODEL:-gemini-2.0-flash-001}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/modernos-edge-agent-key.json
    volumes:
      - ./modernos-edge-agent-key.json:/app/modernos-edge-agent-key.json:ro
    # No host port — internal network only
    logging: *default-logging

  carousel_renderer:
    image: ghcr.io/slingvector/linkedin-engagement-ai-carousel_renderer:${IMAGE_TAG}
    container_name: linkedin_prod_carousel_renderer
    platform: linux/amd64
    restart: unless-stopped
    # No host port — internal network only
    logging: *default-logging

  core_api:
    image: ghcr.io/slingvector/linkedin-engagement-ai-core_api:${IMAGE_TAG}
    container_name: linkedin_prod_core_api
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-linkedin_saas}
      - AI_ENGINE_URL=http://ai_engine:8001
      - CAROUSEL_RENDERER_URL=http://carousel_renderer:8002
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      ai_engine:
        condition: service_started
      carousel_renderer:
        condition: service_started
    volumes:
      - ./tmp/carousel_pdfs:/tmp/carousel_pdfs
    # No host port — proxied via web/cloudflared
    logging: *default-logging

  web:
    image: ghcr.io/slingvector/linkedin-engagement-ai-web:${IMAGE_TAG}
    container_name: linkedin_prod_web
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_API_V2_URL=/api/v2
      - CORE_API_INTERNAL_URL=http://core_api:8000
    depends_on:
      - core_api
    logging: *default-logging

volumes:
  postgres_prod_data:
