x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_os_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data

  ai_engine:
    image: ghcr.io/slingvector/linkedin-engagement-ai-ai_engine:v1.2.5
    platform: linux/amd64
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY:-change_this_internal_microservice_key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=vertexai
      - GCP_PROJECT_ID=mcr-relay-1772228380
      - GCP_LOCATION=us-central1
      - VERTEX_MODEL=gemini-2.0-flash-001
      - GOOGLE_APPLICATION_CREDENTIALS=/app/modernos-edge-agent-key.json
    volumes:
      - /Users/cortex/ventures/linkedin-as-a-service/modernos-edge-agent-key.json:/app/modernos-edge-agent-key.json:ro
      
  core_api: # NO PORTS EXPOSED. ISOLATED.
    image: ghcr.io/slingvector/linkedin-engagement-ai-core_api:v1.2.5
    platform: linux/amd64
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-linkedin_os_prod}
      - REDIS_URL=redis://redis:6379/0
      - AI_ENGINE_URL=http://ai_engine:8001
      - CAROUSEL_RENDERER_URL=http://carousel_renderer:8002
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis
      - ai_engine
      - carousel_renderer

  carousel_renderer:
    build:
      context: ./apps/carousel_renderer
    platform: linux/amd64
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8002:8002"

  ingestion_worker:
    image: ghcr.io/slingvector/linkedin-engagement-ai-ingestion_worker:v1.2.5
    platform: linux/amd64
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    command: ["python", "-m", "app.workers.ingestion_worker"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-linkedin_os_prod}
    depends_on:
      - postgres

  web:
    image: ghcr.io/slingvector/linkedin-engagement-ai-web:v1.2.5
    platform: linux/amd64
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_API_V2_URL=/api/v2
      - CORE_API_INTERNAL_URL=http://core_api:8000
    depends_on:
      - core_api

volumes:
  postgres_prod_data:
  redis_prod_data:
