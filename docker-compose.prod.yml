version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_os}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ai_engine:
    build:
      context: ./apps/ai_engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - X_AI_API_KEY=${X_AI_API_KEY:-dev_key}
      
  core_api:
    build:
      context: ./apps/core_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-linkedin_os}
      - REDIS_URL=redis://redis:6379/0
      - AI_ENGINE_URL=http://ai_engine:8001
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis
      - ai_engine

  ingestion_worker:
    build:
      context: ./apps/core_api
    restart: unless-stopped
    command: ["python", "-m", "app.workers.ingestion_worker"] # Example mapping to worker scripts
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-linkedin_os}
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use an absolute URL mapped locally / publicly
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1 
    depends_on:
      - core_api

volumes:
  postgres_data:
  redis_data:
