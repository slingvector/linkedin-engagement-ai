# docker-compose.yml
# LOCAL DEVELOPMENT — builds from machine source code.
# Usage: docker compose up --build
# Hot-reload: mount source directories as volumes in individual app overrides if needed.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedin_dev_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkedin_saas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai_engine:
    build:
      context: ./apps/ai_engine
    container_name: linkedin_dev_ai_engine
    platform: linux/amd64
    env_file: .env
    environment:
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY:-change_this_internal_microservice_key}
      - LLM_PROVIDER=vertexai
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - VERTEX_MODEL=${VERTEX_MODEL:-gemini-2.0-flash-001}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/modernos-edge-agent-key.json
    volumes:
      - ./modernos-edge-agent-key.json:/app/modernos-edge-agent-key.json:ro
    ports:
      - "8001:8001"

  carousel_renderer:
    build:
      context: ./apps/carousel_renderer
    container_name: linkedin_dev_carousel_renderer
    ports:
      - "8002:8002"

  core_api:
    build:
      context: ./apps/core_api
    container_name: linkedin_dev_core_api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-linkedin_saas}
      - AI_ENGINE_URL=http://ai_engine:8001
      - CAROUSEL_RENDERER_URL=http://carousel_renderer:8002
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ai_engine:
        condition: service_started
      carousel_renderer:
        condition: service_started
    volumes:
      - ./tmp/carousel_pdfs:/tmp/carousel_pdfs

  web:
    build:
      context: ./apps/web
    container_name: linkedin_dev_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_API_V2_URL=/api/v2
      - CORE_API_INTERNAL_URL=http://core_api:8000
    depends_on:
      - core_api

  # ── Ingestion Worker ──────────────────────────────────────────────────────
  # Scrapes LinkedIn feed via linkedin-read-flow and stores posts in Postgres.
  # Runs as a separate process sharing the core_api image.
  # Start with: docker compose --profile ingestion up
  ingestion_worker:
    build:
      context: ./apps/core_api
    container_name: linkedin_dev_ingestion_worker
    profiles: ["ingestion"]
    command: ["python", "-m", "app.workers.bulk_ingestion_worker"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-linkedin_saas}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ~/.linkedin_api:/root/.linkedin_api

volumes:
  postgres_dev_data:
