name: Build and Publish Docker Images

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag like "v1.1.3"

env:
  REGISTRY: ghcr.io
  # Converts your GitHub repo name to lowercase (e.g., slingvector/linkedin-engagement-ai)
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Critical: allows action to push to GHCR

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: apps/ai_engine/Dockerfile
            context: apps/ai_engine
            image: ai_engine
          - dockerfile: apps/core_api/Dockerfile
            context: apps/core_api
            image: core_api
          - dockerfile: apps/core_api/Dockerfile
            context: apps/core_api
            image: ingestion_worker # Uses same context/Dockerfile as core_api, but distinct image if needed (optional)
          - dockerfile: apps/web/Dockerfile
            context: apps/web
            image: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract exact Tag version
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Auto-provided by GitHub!

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.TAG }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
